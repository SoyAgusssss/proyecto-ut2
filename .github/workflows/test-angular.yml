name: Test Angular

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  angular-tests:
    name: Angular Unit + Integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Angular tests
        run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: angular-coverage
          path: coverage

  cypress-e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: angular-tests
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: .
          start: |
            npm run start -- --host 0.0.0.0 --port 4200
            node backend/index.js
          wait-on: 'http://localhost:4200, http://localhost:3000'
          wait-on-timeout: 180
          browser: chrome
          spec: cypress/e2e/**/*.cy.ts
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/proyecto_ut2_ci
          PORT: 3000

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots
            cypress/videos